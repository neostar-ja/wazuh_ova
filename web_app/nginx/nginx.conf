events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream backend {
        server wazuhweb_backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server wazuhweb_frontend:80;
        keepalive 16;
    }

    server {
        listen 3348 ssl;
        http2 on;
        server_name 10.251.150.222;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";

        client_max_body_size 10m;

        # WebSocket — ต้องอยู่ก่อน /wazuh/api/ และ /wazuh/
        # Client: /wazuh/ws/alerts → Backend: /api/ws/alerts
        location /wazuh/ws/ {
            proxy_pass         http://backend/api/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # Backend REST API
        # Client: /wazuh/api/auth/login → Backend: /api/auth/login
        location /wazuh/api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # Frontend static files
        location /wazuh/ {
            proxy_pass         http://frontend/wazuh/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location = / {
            return 301 https://$host:3348/wazuh/;
        }
    }
}
